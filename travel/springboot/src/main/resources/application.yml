server:
  port: 8080

# 数据库配置
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
    url: jdbc:mysql://localhost:3306/travel?useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2b8&allowPublicKeyRetrieval=true
  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

# 配置mybatis实体和xml映射
mybatis:
  ## 映射xml
  mapper-locations: classpath:mapper/*.xml
  configuration:
    # 配置日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

# 文件上传配置
file:
  upload-path: ${user.dir}/springboot/files


# 支付宝配置
ali-pay:
  appId: 9021000162603115
  appPrivateKey: 
  alipayPublicKey: 
  # 回调地址
  #notifyUrl:  http://taa76e83.natappfree.cc/alipay/notify
#  notifyUrl: http://localhost:8080/alipay/notify
#  returnUrl: http://localhost:8080/orders
  notifyUrl: http://localhost:8080/pay/alipay/callback
  returnUrl: http://localhost:8080/pay/orders
  # 网关地址
  gatewayUrl: https://openapi-sandbox.dl.alipaydev.com/gateway.do
  # 编码
  charset: UTF-8
  # 签名类型
  signType: RSA2